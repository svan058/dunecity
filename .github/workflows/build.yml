name: Build Dune Legacy

on:
  push:
    branches: [ main, release-* ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate: on v* tag builds, verify that the source-controlled version metadata
  # (CMakeLists.txt, include/config.h, vcpkg.json) already matches the tag.
  # This catches missing bump commits BEFORE any build/release/upload runs.
  verify-version:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Verify source version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag version: $TAG_VERSION"
          bash scripts/bump-version.sh --check
          SOURCE_VERSION=$(sed -n 's/^project(DuneCity VERSION \([0-9]*\.[0-9]*\.[0-9]*\).*/\1/p' CMakeLists.txt)
          if [ "$SOURCE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: tag is v${TAG_VERSION} but source metadata says ${SOURCE_VERSION}."
            echo "::error::Commit the version bump with 'scripts/bump-version.sh ${TAG_VERSION}' before tagging."
            exit 1
          fi
          echo "OK — all source files agree on $SOURCE_VERSION, matches tag v${TAG_VERSION}"

  build-windows:
    runs-on: windows-latest
    # Wait for version check on tag builds; run unconditionally otherwise
    needs: [verify-version]
    if: always() && (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure CMake
        # Quote the -D arg so PowerShell expands $env:VCPKG_ROOT instead
        # of treating the colon-slash as a literal string. Without the
        # quotes CMake gets the unexpanded path and fails to find the
        # toolchain file.
        run: cmake -B build "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Create Installer Package
        run: |
          cd build
          cmake --install . --prefix install --config Release
          cpack -G ZIP -C Release

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: DuneCity-Windows-Installer
          path: build/*.zip

  build-macos:
    runs-on: [self-hosted, macOS, ARM64]
    needs: [verify-version]
    if: always() && (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped')
    env:
      PATH: /opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
    steps:
      - uses: actions/checkout@v4

      - name: Clean previous build
        run: rm -rf build

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure CMake
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Create DMG Installer
        run: |
          cd build
          cmake --install . --prefix install --config Release
          cpack -G DragNDrop -C Release

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: DuneCity-macOS-DMG
          path: build/*.dmg

      - name: Notify Discord
        if: always() && env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_DEV_WEBHOOK }}
        run: |
          VERSION=$(sed -n 's/^project(DuneCity VERSION \([0-9]*\.[0-9]*\.[0-9]*\).*/\1/p' CMakeLists.txt)
          if [ "${{ job.status }}" = "success" ]; then
            MSG="✅ **macOS build passed** — DuneCity v${VERSION} DMG ready"
          else
            MSG="❌ **macOS build failed** — DuneCity v${VERSION}"
          fi
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\": \"${MSG}\"}" \
            "$DISCORD_WEBHOOK"

  build-linux:
    runs-on: ubuntu-latest
    needs: [verify-version]
    if: always() && (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: linux-${{ hashFiles('vcpkg.json') }}

      # vcpkg builds several autotools-based ports from source on Linux
      # (libxcrypt, sdl2-mixer's flac/opus/etc.) and needs the GNU build
      # toolchain pre-installed on the runner. Without these the Configure
      # step fails with: "libxcrypt currently requires ... autoconf
      # autoconf-archive automake libtoolize". Also pulling in
      # build-essential + libltdl-dev so any other transitive port that
      # needs them is happy.
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf autoconf-archive automake libtool libltdl-dev \
            build-essential pkg-config bison flex \
            libsystemd-dev

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: vcpkg-linux-x64-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-linux-x64-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      # run-vcpkg sets VCPKG_BINARY_SOURCES to 'clear;x-gha,readwrite' but
      # the x-gha backend was removed from vcpkg. The 'clear' prefix also
      # disables the default file-based cache. Override to use files-based
      # caching backed by the actions/cache step above.
      - name: Fix vcpkg binary caching
        run: echo "VCPKG_BINARY_SOURCES=clear;files,$HOME/.cache/vcpkg/archives,readwrite" >> "$GITHUB_ENV"

      - name: Configure CMake
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_BUILD_TYPE=Release

      - name: Build
        # Limit to 2 parallel jobs — ubuntu-latest has 4 cores but only 7GB
        # RAM, and 4 concurrent g++ -O2 processes on large TUs exceed that.
        run: cmake --build build --config Release --parallel 2

      - name: Create Linux Packages
        run: |
          cd build
          cmake --install . --prefix install --config Release
          cpack -G "DEB;RPM;TGZ" -C Release

      - name: Create AppImage
        run: |
          # Download linuxdeploy (fuse-less FUSE_APPIMAGE_EXTRACT_AND_RUN avoids
          # "fuse: device not found" errors on GitHub-hosted runners)
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

          # Stage the AppDir from the cmake install tree
          cd build
          cmake --install . --prefix AppDir/usr --config Release

          # Ensure icons and desktop file are in the right AppDir locations
          mkdir -p AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/128x128/apps
          cp ../dunecity.desktop AppDir/usr/share/applications/
          cp ../dunecity-128x128.png AppDir/usr/share/icons/hicolor/128x128/apps/dunecity.png

          # linuxdeploy bundles the binary's shared-library dependencies into the
          # AppDir, generates AppRun, and creates the final .AppImage
          ARCH=x86_64 FUSE_APPIMAGE_EXTRACT_AND_RUN=1 \
            ../linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/dunecity \
            --desktop-file AppDir/usr/share/applications/dunecity.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/128x128/apps/dunecity.png \
            --output appimage

          # Rename with version for clarity
          VERSION=$(sed -n 's/^project(DuneCity VERSION \([0-9]*\.[0-9]*\.[0-9]*\).*/\1/p' ../CMakeLists.txt)
          mv DuneCity-*.AppImage "DuneCity-${VERSION}-Linux-x86_64.AppImage" 2>/dev/null || true

      - name: Upload Packages
        uses: actions/upload-artifact@v4
        with:
          name: DuneCity-Linux-Packages
          path: |
            build/*.deb
            build/*.rpm
            build/*.tar.gz
            build/*.AppImage

  # Rolling dev build: update a "latest-dev" pre-release on every main push
  # so builds are always downloadable from the releases page.
  dev-release:
    needs: [build-windows, build-macos]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: DuneCity-Windows-Installer
          path: dist/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: DuneCity-macOS-DMG
          path: dist/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: DuneCity-Linux-Packages
          path: dist/linux

      - name: Update latest-dev release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(sed -n 's/^project(DuneCity VERSION \([0-9]*\.[0-9]*\.[0-9]*\).*/\1/p' CMakeLists.txt)
          SHA="${GITHUB_SHA::8}"
          NOTES="Dev build v${VERSION} (${SHA})\n\nAuto-built from main @ $(date -u '+%Y-%m-%d %H:%M UTC')\n\n**Downloads** (attached below)"

          # Delete old dev release if it exists, then create fresh
          gh release delete latest-dev --yes 2>/dev/null || true
          git push origin :refs/tags/latest-dev 2>/dev/null || true

          # Collect whatever artifacts succeeded
          shopt -s nullglob
          FILES=(dist/*/*)
          if [ ${#FILES[@]} -gt 0 ]; then
            echo -e "$NOTES" | gh release create latest-dev "${FILES[@]}" \
              --title "Dev Build v${VERSION}" \
              --notes-file - \
              --prerelease
          fi

  # Auto-publish a GitHub Release on every v* tag push. Pulls down the
  # three platform artifacts from this run and attaches them. The
  # in-game VersionChecker hits the GitHub Releases /latest endpoint,
  # so creating a release here automatically flips every existing
  # install's "update available" flag the next time they launch.
  release:
    needs: [verify-version, build-windows, build-macos]
    # Linux is best-effort; Windows + macOS are required for release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: DuneCity-Windows-Installer
          path: dist/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: DuneCity-macOS-DMG
          path: dist/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: DuneCity-Linux-Packages
          path: dist/linux

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          NOTES_FILE="$(mktemp)"
          {
            echo "Dune City ${TAG}"
            echo
            echo "Auto-built from tag ${TAG}. See the [CHANGELOG](https://github.com/${GITHUB_REPOSITORY}/commits/${TAG}) for what's in this release."
            echo
            echo "**Downloads** (attached below):"
            echo "- Windows: \`DuneCity-*.zip\`"
            echo "- macOS: \`DuneCity-*.dmg\`"
            echo "- Linux: \`.AppImage\` (recommended) / \`.deb\` / \`.rpm\` / \`.tar.gz\`"
            echo
            echo "Upgrading from a previous Dune City install? Your built-in mod INI files are reseeded automatically on first launch."
          } > "$NOTES_FILE"

          # If a release for this tag already exists (e.g. it was hand-
          # made first), upload the artifacts onto it; otherwise create
          # a fresh release.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*/* --clobber
            gh release edit "$TAG" --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" dist/*/* \
              --title "Dune City ${TAG}" \
              --notes-file "$NOTES_FILE"
          fi

      - name: Update dunelegacy.com website
        env:
          WEBSITE_TOKEN: ${{ secrets.WEBSITE_DEPLOY_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # Strip leading 'v' to get bare version number (e.g. v1.0.5 -> 1.0.5)
          VERSION="${TAG#v}"

          git clone "https://x-access-token:${WEBSITE_TOKEN}@github.com/svan058/dunelegacy.com.git" website-repo
          cd website-repo

          # Guard: don't let a stale older run overwrite a newer version
          CURRENT=$(sed -n 's/.*softwareVersion": "\([0-9]*\.[0-9]*\.[0-9]*\)".*/\1/p' website/index.html | head -1)
          if [ -n "$CURRENT" ]; then
            CUR_PATCH=$(echo "$CURRENT" | cut -d. -f3)
            NEW_PATCH=$(echo "$VERSION" | cut -d. -f3)
            if [ "$NEW_PATCH" -lt "$CUR_PATCH" ] 2>/dev/null; then
              echo "Website already at $CURRENT, skipping update to $VERSION (older)"
              exit 0
            fi
          fi

          # Replace version numbers and download URLs in both HTML files
          for FILE in website/index.html website/dune-city.html; do
            # Download URLs: v1.0.4/DuneCity-1.0.4-... -> vVERSION/DuneCity-VERSION-...
            sed -i "s|/v[0-9]\+\.[0-9]\+\.[0-9]\+/DuneCity-[0-9]\+\.[0-9]\+\.[0-9]\+-|/v${VERSION}/DuneCity-${VERSION}-|g" "$FILE"
            # Release tag links
            sed -i "s|releases/tag/v[0-9]\+\.[0-9]\+\.[0-9]\+|releases/tag/v${VERSION}|g" "$FILE"
            # Display version strings: "Dune City X.X.X"
            sed -i "s|Dune City [0-9]\+\.[0-9]\+\.[0-9]\+|Dune City ${VERSION}|g" "$FILE"
            # Download button text: "Download X.X.X"
            sed -i "s|Download [0-9]\+\.[0-9]\+\.[0-9]\+|Download ${VERSION}|g" "$FILE"
            # Latest label: "Latest: X.X.X"
            sed -i "s|Latest: [0-9]\+\.[0-9]\+\.[0-9]\+|Latest: ${VERSION}|g" "$FILE"
            # Schema softwareVersion
            sed -i "s|softwareVersion\": \"[0-9]\+\.[0-9]\+\.[0-9]\+\"|softwareVersion\": \"${VERSION}\"|g" "$FILE"
            # "X.X.X is current"
            sed -i "s|[0-9]\+\.[0-9]\+\.[0-9]\+ is current|${VERSION} is current|g" "$FILE"
          done

          git config user.email "ci@dunelegacy.com"
          git config user.name "DuneCity CI"
          git add website/index.html website/dune-city.html
          git diff --cached --quiet || git commit -m "release: bump website to Dune City ${VERSION}"
          git push
